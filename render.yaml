services:
  - type: web
    name: fair-split-api
    env: python
    buildCommand: pip install -r backend/requirements-deploy.txt
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: GROQ_API_KEY
        sync: false
      - key: USE_VISION
        value: "1"
